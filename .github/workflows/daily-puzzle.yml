name: Daily German Puzzle

on:
  schedule:
    # 03:05 UTC daily (just after the puzzle rolls over at 03:00)
    - cron: "5 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-daily-numpy

      - name: Install dependencies
        # The daily job only needs numpy (vectors + angles are precomputed and
        # committed). No gensim / 704MB model download required.
        run: pip install numpy

      - name: Generate today's puzzle
        run: python scripts/generate_daily_puzzle.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/secret_words_de/ .github/badge/daily.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            PUZZLE_NUM=$(python -c 'import json;print(json.load(open(".github/badge/daily.json"))["message"].lstrip("#"))')
            git commit -m "chore: daily German puzzle Nr. ${PUZZLE_NUM}"
            git push
          fi
