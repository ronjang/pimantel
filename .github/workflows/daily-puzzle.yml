name: Daily German Puzzle

on:
  schedule:
    # 03:05 UTC daily (just after the puzzle rolls over at 03:00)
    - cron: "5 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Cache word2vec model
        uses: actions/cache@v4
        with:
          path: ~/.cache/pimantel/german.model
          key: german-word2vec-model-v1

      - name: Cache t-SNE artifacts
        uses: actions/cache@v4
        with:
          path: |
            scripts/data/angles.npy
            scripts/data/vocab.json
            scripts/data/model_keys.json
            src/data/word_list_de.json
          key: tsne-artifacts-v1

      - name: Build vocab + t-SNE (only if artifacts are missing)
        run: |
          if [ ! -f scripts/data/angles.npy ]; then
            echo "Stage 1 artifacts missing — running build_vocab_and_tsne.py"
            python scripts/build_vocab_and_tsne.py
          else
            echo "Stage 1 artifacts present — skipping t-SNE"
          fi

      - name: Generate today's puzzle
        run: python scripts/generate_daily_puzzle.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/secret_words_de/ src/data/word_list_de.json .github/badge/daily.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily German puzzle $(cat .github/badge/daily.json | python -c 'import sys,json;print(json.load(sys.stdin)["message"])')"
            git push
          fi
