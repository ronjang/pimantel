name: Daily German Puzzle

on:
  schedule:
    # 03:05 UTC daily (just after the puzzle rolls over at 03:00)
    - cron: "5 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-daily-numpy

      - name: Install dependencies
        # The daily job only needs numpy (vectors + angles are precomputed and
        # committed). No gensim / 704MB model download required.
        run: pip install numpy

      - name: Generate today's puzzle
        run: python scripts/generate_daily_puzzle.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/secret_words_de/ .github/badge/daily.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily German puzzle $(cat .github/badge/daily.json | python -c 'import sys,json;print(json.load(sys.stdin)["message"])')"
            git push
          fi
