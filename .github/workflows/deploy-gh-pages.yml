name: Deploy static site to gh-pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-gh-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Read app version
        id: app_version
        run: |
          node -e "process.stdout.write('value=' + require('./package.json').version)" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          CI: "false"
          GENERATE_SOURCEMAP: "false"
          REACT_APP_MULTIPLAYER_ENABLED: "true"
          REACT_APP_MULTIPLAYER_SOCKET_URL: "https://api.pimantel.de"
          REACT_APP_SEMVER: "${{ steps.app_version.outputs.value }}"
          REACT_APP_VERSION: "${{ github.sha }}"
          REACT_APP_VERSION_URL: "https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true
